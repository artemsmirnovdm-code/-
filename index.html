<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Мой список дел</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f5f5f5;
    }

    input {
      width: 75%;
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    ul { padding: 0; margin-top: 16px; }

    li {
      list-style: none;
      background: white;
      padding: 10px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .done span { text-decoration: line-through; color: gray; }

    span { flex: 1; }

    .del { color: red; border: none; background: none; font-size: 16px; }
  </style>
</head>
<body>

  <h2>Список дел</h2>

  <div id="app">
    <input v-model="newTodo" @keyup.enter="add" placeholder="Новая задача..." />
    <button @click="add">Добавить</button>

    <ul>
      <li v-for="todo in todos" :key="todo.id" :class="{ done: todo.done }">
        <input type="checkbox" v-model="todo.done" />
        <span>{{ todo.text }}</span>
        <button class="del" @click="remove(todo)">X</button>
      </li>
    </ul>

    <p v-if="todos.length">Осталось: {{ todos.filter(t => !t.done).length }}</p>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    Vue.createApp({
      data() {
        return {
          newTodo: '',
          todos: [
            { id: 1, text: 'Пройти курс', done: false },
            { id: 2, text: 'Написать проект', done: false },
          ]
        }
      },
      methods: {
        add() {
          if (!this.newTodo.trim()) return
          this.todos.push({ id: Date.now(), text: this.newTodo, done: false })
          this.newTodo = ''
        },
        remove(todo) {
          this.todos = this.todos.filter(t => t !== todo)
        }
      }
    }).mount('#app')
  </script>

</body>
</html>
