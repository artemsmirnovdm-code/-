<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел на Vue 3</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; background: #42b883; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #33a06f; }
        button.delete-btn { background: #ff4c4c; padding: 5px 10px; font-size: 14px; }
        button.delete-btn:hover { background: #e03e3e; }
        .todo-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .todo-item.completed span { text-decoration: line-through; color: #888; }
        .todo-content { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <h2>Cписок задач</h2>

    <div class="input-group">
        <input 
            v-model="newTaskText" 
            @keyup.enter="addTask" 
            type="text" 
            placeholder="Что нужно сделать?"
        >
        <button @click="addTask">Добавить</button>
    </div>

    <p v-if="tasks.length === 0" style="color: #666; text-align: center;">
        Задач нет
    </p>

    <ul style="list-style: none; padding: 0;">
        <li 
            v-for="task in tasks" 
            :key="task.id" 
            class="todo-item" 
            :class="{ completed: task.isDone }"
        >
            <label class="todo-content">
                <input type="checkbox" v-model="task.isDone">
                <span>{{ task.text }}</span>
            </label>
            <button class="delete-btn" @click="removeTask(task.id)">Удалить</button>
        </li>
    </ul>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const newTaskText = ref('');
            const tasks = ref([
                { id: 1, text: 'Посмотреть курс', isDone: true },
                { id: 2, text: 'Написать проект', isDone: false },
            ]);

            const addTask = () => {
                if (newTaskText.value.trim() === '') return;

                tasks.value.push({
                    id: Date.now(), 
                    text: newTaskText.value,
                    isDone: false
                });

                newTaskText.value = ''; 
            };

            const removeTask = (taskId) => {
                tasks.value = tasks.value.filter(task => task.id !== taskId);
            };

            return {
                newTaskText,
                tasks,
                addTask,
                removeTask
            }
        }
    }).mount('#app');
</script>

</body>
</html>
